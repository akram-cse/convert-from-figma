<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBTT – Orange Juice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Pacifico&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="assets/css/lib/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/app/style.css">


</head>

<body>

    <header class="page-wrapper">
        <!-- Main Navbar -->
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container">
                <!-- Brand -->
                <a class="navbar-brand brand-pubtt" href="#">
                    <img src="assets/img/PUBTT.png" alt="Logo">
                </a>

                <!-- Offcanvas Toggler for Mobile -->
                <button class="navbar-toggler border-0 shadow-none text-white" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                    <i class="fas fa-bars fs-3"></i>
                </button>

                <!-- Offcanvas -->
                <div class="offcanvas offcanvas-end mobile-offcanvas" tabindex="-1" id="offcanvasNavbar"
                    aria-labelledby="offcanvasNavbarLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title brand-pubtt text-dark" id="offcanvasNavbarLabel"><em>PUBTT</em></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body align-items-center">
                        <!-- Nav Links -->
                        <ul class="navbar-nav mx-auto nav-links-custom gap-lg-4 mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="#">Menu</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Products</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Abouts</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Sales</a>
                            </li>
                        </ul>

                        <!-- Call to Action -->
                        <div class="d-flex align-items-center nav-actions">
                            <button class="btn btn-shop-now rounded-pill d-flex align-items-center gap-2 p-1 ps-4">
                                <span class="fw-bold">Shop Now</span>
                                <span
                                    class="icon-circle d-flex align-items-center justify-content-center rounded-circle">
                                    <i class="fa-solid fa-arrow-right"></i>
                                </span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>


    <section class="hero-banner">

        <!-- Decorative: blurred slice top-center -->
        <img src="assets/img/orange-half-slice.png" alt="Orange" class="deco deco-blur-top" aria-hidden="true">

        <!-- Decorative: blurred slice mid-right -->
        <img src="assets/img/orange-blur.png" alt="" class="deco deco-blur-right" aria-hidden="true">

        <!-- Decorative: sharp orange slice bottom-left -->
        <img src="assets/img/orange-slice.png" alt="" class="deco deco-slice-bottom-left" aria-hidden="true">

        <!-- Main bottle -->
        <img src="assets/img/bottle-orange-rotate.png" alt="Orange Juice Bottle" class="deco deco-bottle">

        <!-- Back link -->
        <a href="javascript:history.back()" class="hero-back-link">Back</a>

        <!-- Cursive headline: Orange (top-left) -->
        <img src="assets/img/orange.png" class="hero-img-orange " alt="text">

        <!-- Cursive headline: Juice (bottom-right) -->
        <img src="assets/img/juice.png" class="hero-img-juice " alt="text">

        <!-- Right-side size selector -->
        <div class="hero-size-selector d-flex flex-column align-items-center gap-3">
            <button class="size-btn size-btn--active">500</button>
            <button class="size-btn">250</button>
            <button class="size-btn">100</button>
        </div>

    </section>

    <!-- Section gap bridge — maintains bg color continuity -->
    <div class="section-bridge"></div>

    <section class="hero-banner-2">

        <!-- Decorative: blurred slice top-center -->
        <img src="assets/img/orange-half-slice.png" alt="Orange" class="deco-2 deco-blur-top-2" aria-hidden="true">

        <!-- Decorative: blurred slice mid-right -->
        <img src="assets/img/orange-blur.png" alt="" class="deco-2 deco-blur-right-2" aria-hidden="true">

        <!-- Decorative: sharp orange slice bottom-left -->
        <img src="assets/img/orange-slice.png" alt="" class="deco-2 deco-slice-bottom-left-2" aria-hidden="true">

        <!-- Main bottle -->
        <img src="assets/img/bottle-peach.png" alt="Orange Juice Bottle" class="deco-2 deco-bottle-2">

        <!-- Back link -->


        <!-- Cursive headline: Peach (replaces orange.png image) -->
        <h1 class="hero-text-peach">Peach</h1>

        <!-- Cursive headline: Juice (bottom-right) -->
        <img src="assets/img/juice.png" class="hero-img-juice-2" alt="text">

        <!-- Right-side size selector -->
        <div class="hero-size-selector-2 d-flex flex-column align-items-center gap-3">
            <button class="size-btn-2">500</button>
            <button class="size-btn-2 size-btn--active-2">250</button>
            <button class="size-btn-2">100</button>
        </div>

    </section>

    <!-- Bootstrap Bundle JS -->
    <script src="assets/js/lib/bootstrap.bundle.min.js"></script>
    <script src="assets/js/lib/fontawesome.all.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sectionOne = document.querySelector('.hero-banner');
            const sectionTwo = document.querySelector('.hero-banner-2');
            const buttons = document.querySelectorAll('.size-btn, .size-btn-2');

            function scrollToSection(target) {
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }

            buttons.forEach((btn) => {
                btn.addEventListener('click', () => {
                    const label = btn.textContent.trim();
                    const isSecondGroup = btn.classList.contains('size-btn-2');
                    const groupSelector = isSecondGroup ? '.size-btn-2' : '.size-btn';
                    const activeClass = isSecondGroup ? 'size-btn--active-2' : 'size-btn--active';

                    document.querySelectorAll(groupSelector).forEach((b) => b.classList.remove(activeClass));
                    btn.classList.add(activeClass);

                    if (label === '500') {
                        scrollToSection(sectionOne);
                    } else if (label === '200' || label === '250') {
                        scrollToSection(sectionTwo);
                    }
                });
            });
        });
    </script>
</body>

</html>
